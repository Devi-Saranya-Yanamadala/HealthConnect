spring.application.name=api-gateway
server.port=8083
spring.security.enabled=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

logging.level.org.springframework.cloud.gateway.route=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG

# 1. AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# 2. NOTIFICATION SERVICE
spring.cloud.gateway.routes[1].id=notification-service
spring.cloud.gateway.routes[1].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/notifications/**

# 3. DOCTOR SERVICE
spring.cloud.gateway.routes[2].id=doctor-service
spring.cloud.gateway.routes[2].uri=lb://DOCTOR-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/doctors/**

# 4. PATIENT SERVICE
spring.cloud.gateway.routes[3].id=patient-service
spring.cloud.gateway.routes[3].uri=lb://PATIENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/patients/**

# 5. SLOT BOOKING SERVICE
