# ===============================
# 1. SERVER & APPLICATION CONFIG
# ===============================
server.port=5004
spring.application.name=notification-service

# ===============================
# 2. DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/healthconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=G@2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# 3. EUREKA CLIENT CONFIG
# ===============================
# Point this to your Audit Service (running on 5010)
eureka.client.service-url.defaultZone=http://localhost:5010/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Use IP addresses for registration
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# ===============================
# 4. EMAIL CONFIGURATION (SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# 5. SWAGGER / OPENAPI (Fix for Spring Boot 3)
# ===============================
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ===============================
# 6. MONITORING & ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,readiness,liveness
management.endpoint.health.show-details=always