# ===============================
# 1. SERVICE IDENTITY
# ===============================
spring.application.name=audit-service
server.port=5010

# ===============================
# 2. DATABASE CONFIGURATION
# ===============================
# createDatabaseIfNotExist ensures the 'audit_db' is created automatically
spring.datasource.url=jdbc:mysql://localhost:3306/audit_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# 3. EUREKA CLIENT CONFIGURATION
# ===============================
# Matching the Auth Service Eureka URL (no trailing slash)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Instance settings for the Eureka Dashboard
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# ===============================
# 4. SECURITY & JWT CONFIGURATION
# ===============================
# IMPORTANT: This MUST match the key used in your Auth Service code/properties.
# If Auth Service uses a different key, paste it here.
# Audit Service - application.properties
# Change this line to the EXACT string from your Auth JwtUtil:
jwt.secret=healthconnect-secret-key-healthconnect-32

# ===============================
# 5. LOGGING & DEBUGGING
# ===============================
# This will help you see exactly why a 403 occurs in your IDE console
logging.level.org.springframework.security=DEBUG
logging.level.com.cts.healthconnect=DEBUG

# OpenAPI/Swagger settings
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html