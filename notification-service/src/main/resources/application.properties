# ===============================
# 1. SERVER & APPLICATION CONFIG
# ===============================
server.port=8082
spring.application.name=notification-service

# ===============================
# 2. DATABASE CONFIG (MySQL)
# ===============================
# Replace 'healthconnect_db' with your actual database name
spring.datasource.url=jdbc:mysql://localhost:3306/healthconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# 3. EUREKA CLIENT CONFIG
# ===============================
# This tells the service where to find the Eureka Discovery Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Use IP addresses for registration (better for local dev/Docker)
eureka.instance.prefer-ip-address=true
# Unique ID to identify instances in the Eureka dashboard
eureka.instance.instance-id=${spring.application.name}:${random.value}

# ===============================
# 4. MONITORING & ACTUATOR
# ===============================
# Expose health and info endpoints for the Eureka dashboard to monitor status
management.endpoints.web.exposure.include=health,info,readiness,liveness
management.endpoint.health.show-details=always

# ===============================
# 5. LOGGING (Optional for Debugging)
# ===============================
logging.level.org.springframework.web=INFO
logging.level.com.cts.healthconnect=DEBUG
# Enables logging of Feign Client requests
logging.level.com.cts.healthconnect.notification.client=DEBUG