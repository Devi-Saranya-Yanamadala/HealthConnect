# 12. CLAIMS SERVICE
spring.cloud.gateway.routes[11].id=claims-service
spring.cloud.gateway.routes[11].uri=lb://BILLING-SERVICE
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/claims/**