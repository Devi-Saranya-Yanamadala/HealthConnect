# =====================
# BASIC CONFIG
# =====================
spring.application.name=api-gateway
server.port=8083

# =====================
# AUTH SERVICE
# =====================
spring.cloud.gateway.routes[0].id=auth
spring.cloud.gateway.routes[0].uri=http://localhost:5006
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# =====================
# DOCTOR SERVICE
# =====================
spring.cloud.gateway.routes[1].id=doctor
spring.cloud.gateway.routes[1].uri=http://localhost:5000
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/doctors/**

