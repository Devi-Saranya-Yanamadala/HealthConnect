# ===============================
# 1. SERVER & APPLICATION CONFIG
# ===============================
server.port=5004
spring.application.name=notification-service

# ===============================
# 2. DATABASE CONFIG (MySQL)
# ===============================
# allowPublicKeyRetrieval=true is added to fix the RSA key exchange error with MySQL 8.0+
spring.datasource.url=jdbc:mysql://localhost:3306/healthconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root

spring.datasource.password=YOUR_PASSWORD

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# 3. EUREKA CLIENT CONFIG
# ===============================
# Registers this service with the Discovery Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Use IP addresses for registration (critical for cross-service communication)
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# ===============================
# 4. EMAIL CONFIGURATION (SMTP)
# ===============================
# Replace with your Gmail and App Password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# 5. MONITORING & ACTUATOR
# ===============================
# Expose health endpoints for Eureka and Gateway monitoring
management.endpoints.web.exposure.include=health,info,readiness,liveness
management.endpoint.health.show-details=always

# ===============================
# 6. LOGGING (Optimized for Debugging)
# ===============================
logging.level.org.springframework.web=INFO
logging.level.com.cts.healthconnect=DEBUG
# Debug level for OpenFeign to track inter-service calls
logging.level.org.springframework.cloud.openfeign=DEBUG