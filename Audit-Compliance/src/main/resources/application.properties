# ===============================
# 1. SERVICE IDENTITY
# ===============================
spring.application.name=audit-compliance
server.port=5010

# ===============================
# 2. DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/audit_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# 3. EUREKA CLIENT CONFIGURATION
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# ===============================
# 4. SECURITY & JWT CONFIGURATION
# ===============================
jwt.secret=healthconnect-secret-key-healthconnect-32

# ===============================
# 5. LOGGING & DEBUGGING
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.com.cts.healthconnect=DEBUG

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html